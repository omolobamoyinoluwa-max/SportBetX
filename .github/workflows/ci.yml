name: CI

on:
  push:
    branches: [main, "fix/**", "feat/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend – lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --passWithNoTests

  frontend:
    name: Frontend – lint, type-check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/betting-interface

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/betting-interface/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

  check-env-script:
    name: Validate check-env.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./scripts"
